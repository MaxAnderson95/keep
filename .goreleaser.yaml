version: 2

project_name: keep

before:
  hooks:
    - go mod tidy
    # The SPA must exist in web/dist before the Go build embeds it (W13).
    # Vite+ (vp) is on PATH in CI via release.yml; the toolchain version is
    # pinned by web/pnpm-workspace.yaml + the lockfile.
    - sh -c "cd web && vp install && vp run build"

builds:
  - id: keep
    main: .
    binary: keep
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: keep
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: MaxAnderson95
    name: keep
  draft: false
  prerelease: auto
