name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable

      # The installer script is checksum-pinned and the vp launcher version is
      # pinned via VP_VERSION, matching the SHA-pinning discipline of the
      # actions above (the vite-plus toolchain itself is pinned by
      # web/pnpm-workspace.yaml + the lockfile). Deliberate upgrades: re-hash
      # the script and bump VP_VERSION together.
      - name: Install Vite+
        env:
          VP_VERSION: 0.1.24
          VP_INSTALLER_SHA256: 58bb052c6a007e662e99667d65686251b16d6b39aa21155487da6d51280b3d54
        run: |
          curl -fsSL https://vite.plus -o /tmp/vp-install.sh
          echo "${VP_INSTALLER_SHA256}  /tmp/vp-install.sh" | sha256sum -c -
          bash /tmp/vp-install.sh
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
