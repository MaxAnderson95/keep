name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable

      - name: Install Vite+
        run: |
          curl -fsSL https://vite.plus | bash
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Frontend install, check, build
        working-directory: web
        run: |
          vp install
          vp check
          vp run build

      # After the frontend build so go:embed sees a real web/dist.
      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...
