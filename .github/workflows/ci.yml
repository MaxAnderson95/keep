name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: stable

      # Pinned the same way as release.yml — keep the hash and VP_VERSION in
      # sync between the two workflows when upgrading.
      - name: Install Vite+
        env:
          VP_VERSION: 0.1.24
          VP_INSTALLER_SHA256: 58bb052c6a007e662e99667d65686251b16d6b39aa21155487da6d51280b3d54
        run: |
          curl -fsSL https://vite.plus -o /tmp/vp-install.sh
          echo "${VP_INSTALLER_SHA256}  /tmp/vp-install.sh" | sha256sum -c -
          bash /tmp/vp-install.sh
          echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - name: Frontend install, check, build
        working-directory: web
        run: |
          vp install
          vp check
          vp run build

      # After the frontend build so go:embed sees a real web/dist.
      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...
